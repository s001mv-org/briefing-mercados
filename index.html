<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Morning Note + Dashboard de Oportunidades</title>
<style>
body{background:#0d1117;color:#c9d1d9;font-family:-apple-system,sans-serif;text-align:center;padding:50px 20px;}
h1{color:#f0f6fc;font-size:28px;margin-bottom:8px;}
.sub{color:#8b949e;font-size:14px;margin-bottom:32px;}
.btn-group{display:flex;flex-wrap:wrap;justify-content:center;gap:16px;margin-bottom:40px;}
.btn{background:#1f6feb;color:#fff;padding:16px 32px;text-decoration:none;border-radius:8px;font-weight:600;font-size:16px;min-width:200px;}
.btn:hover{background:#388bfd;}
.btn.dashboard{background:#238636;}
.btn.dashboard:hover{background:#2ea043;}
.caja{background:#161b22;border:1px solid #30363d;border-radius:12px;max-width:520px;margin:0 auto;padding:24px;text-align:left;}
.caja h2{color:#f0f6fc;margin:0 0 16px;padding-bottom:10px;border-bottom:1px solid #30363d;font-size:17px;}
ul{list-style:none;padding:0;margin:0;}
li a{display:block;padding:10px 0;color:#58a6ff;text-decoration:none;border-bottom:1px solid #21262d;font-size:14px;}
li a:hover{color:#79c0ff;}
</style>
</head>
<body>
<h1>📊 Morning Note + Dashboard de Oportunidades</h1>
<p class="sub">Actualización automática diaria (L-V) — Datos en tiempo real</p>

<div class="btn-group">
  <a href="latest.html" class="btn">📈 Morning Note de Hoy</a>
  <a href="dashboard-latest.html" class="btn dashboard">🎯 Dashboard de Oportunidades</a>
</div>

<div class="caja">
  <h2>📚 Histórico Morning Notes</h2>
  <ul id="mn-links"></ul>
</div>

<div class="caja" style="margin-top:24px;">
  <h2>📚 Histórico Dashboards</h2>
  <ul id="db-links"></ul>
</div>

<script>
// Cargar enlaces dinámicamente desde el servidor
fetch('historico/')
  .then(r => r.text())
  .then(html => {
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    const links = doc.querySelectorAll('a');
    const mnList = document.getElementById('mn-links');
    const dbList = document.getElementById('db-links');
    
    let mnFiles = [];
    let dbFiles = [];
    
    links.forEach(a => {
      const href = a.getAttribute('href');
      if (href && href.endsWith('.html') && !href.includes('..')) {
        if (href.startsWith('historico/')) {
          mnFiles.push(href);
        } else if (href.startsWith('dashboard-historico/')) {
          dbFiles.push(href);
        }
      }
    });
    
    mnFiles.sort().reverse().slice(0, 15).forEach(f => {
      const li = document.createElement('li');
      const date = f.replace('historico/', '').replace('.html', '');
      li.innerHTML = `<a href="${f}">📊 ${date}</a>`;
      mnList.appendChild(li);
    });
    
    dbFiles.sort().reverse().slice(0, 15).forEach(f => {
      const li = document.createElement('li');
      const date = f.replace('dashboard-historico/', '').replace('.html', '');
      li.innerHTML = `<a href="${f}">🎯 ${date}</a>`;
      dbList.appendChild(li);
    });
  })
  .catch(() => {
    document.getElementById('mn-links').innerHTML = '<li style="color:#8b949e;">Cargando...</li>';
    document.getElementById('db-links').innerHTML = '<li style="color:#8b949e;">Cargando...</li>';
  });
</script>

<footer style="margin-top:40px;color:#8b949e;font-size:12px;border-top:1px solid #30363d;padding-top:20px;">
  <p>Datos: Yahoo Finance • Análisis con IA • No asesoramiento financiero</p>
</footer>
</body>
</html>
