name: Generar Briefing + Dashboard

on:
  schedule:
    - cron: '0 5 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generar-contenido:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar Morning Note
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Ejecutar Dashboard
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python dashboard.py

      - name: Publicar en GitHub Pages
        run: |
          git config --global user.name "Bot Financiero"
          git config --global user.email "bot@briefing.com"
          
          git pull origin main --rebase || true
          
          git add index.html latest.html historico/
          git add dashboard-latest.html dashboard-historico/
          
          git commit -m "Briefing + Dashboard: $(date +'%Y-%m-%d %H:%M')" || echo "Sin cambios"
          git push origin main
