name: Generar Briefing Diario de Mercados

on:
  schedule:
    - cron: '0 5 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generar-briefing:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Importante: trae todo el historial para evitar conflictos

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar generador de briefing
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Publicar en GitHub Pages
        run: |
          git config --global user.name "Bot Financiero"
          git config --global user.email "bot@briefing.com"
          
          # 🔥 SOLUCIÓN: Hacer pull antes de push para resolver conflictos
          git pull origin main --rebase || true
          
          git add index.html latest.html historico/
          git commit -m "Briefing diario: $(date +'%Y-%m-%d %H:%M')" || echo "Sin cambios para commitear"
          git push origin main
